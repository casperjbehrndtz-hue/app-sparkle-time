<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NemtBudget – Offline</title>
    <meta name="theme-color" content="#1a2332" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #1a2332;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 420px;
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1.5rem;
        opacity: 0.7;
      }
      h1 {
        font-family: 'Syne', sans-serif;
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #ffffff;
      }
      p {
        font-size: 1.05rem;
        line-height: 1.6;
        color: #94a3b8;
        margin-bottom: 2rem;
      }
      button {
        background: #3b82f6;
        color: #ffffff;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover { background: #2563eb; }
      button:active { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">&#x1F4F6;</div>
      <h1>Du er offline</h1>
      <p>Tjek din internetforbindelse og pr&oslash;v igen.</p>
      <button onclick="window.location.reload()">Pr&oslash;v igen</button>
    </div>
  </body>
</html>
