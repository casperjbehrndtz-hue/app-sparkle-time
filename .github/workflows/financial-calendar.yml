name: Financial Calendar Reminders

on:
  # 2. hverdag i måneden kl. 08:00 UTC (10:00 dansk tid)
  # Kører hver måned, men edge function tjekker om der er indhold for måneden
  schedule:
    - cron: "0 8 2 * *"
  workflow_dispatch:

jobs:
  send-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Send financial calendar emails
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-financial-calendar")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Financial calendar failed with HTTP $HTTP_CODE"
            exit 1
          fi
