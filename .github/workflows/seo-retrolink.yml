name: SEO Internal Linking

on:
  # Run every Wednesday at 06:30 UTC (08:30 dansk tid)
  schedule:
    - cron: "30 6 * * 3"
  workflow_dispatch:

jobs:
  auto-link:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-inject internal links
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"action":"auto_link"}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/seo-retrolink")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: edge function returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Internal linking completed"
