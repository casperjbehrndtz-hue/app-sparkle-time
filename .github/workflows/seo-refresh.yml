name: SEO Content Refresh

on:
  # Run every Monday at 08:00 UTC (10:00 dansk tid), after analytics sync
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  refresh-content:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-refresh underperforming articles
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"action":"auto_refresh"}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/seo-refresh")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: edge function returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Content refresh completed"
