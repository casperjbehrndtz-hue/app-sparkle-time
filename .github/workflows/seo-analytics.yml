name: SEO Analytics (GSC Sync)

on:
  # Run every Sunday at 07:00 UTC (09:00 dansk tid)
  schedule:
    - cron: "0 7 * * 0"
  workflow_dispatch:

jobs:
  sync-gsc:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Google Search Console data
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"action":"full_sync"}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/seo-analytics")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: edge function returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "GSC sync completed"
